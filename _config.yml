# General
title: Ralf
description: Anyone can find the switch after the lights are on
url: https://r4lfvb.github.io
avatar:
#paginate: 5
permalink: pretty
cover_image: /images/background.jpg

plugins:
  - jekyll-remote-theme
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap
  - jemoji

remote_theme: vszhub/not-pure-poole

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - scripts/
  - not-pure-poole.gemspec

# Optimize Jekyl SEO Tag
twitter:
  username: r4lfvb
  card: summary
logo: logo.png
social:
  name: Ralf
  links:
    - https://twitter.com/ralfvb
    - https://github.com/r4lfvb
#google_site_verification: xxxxx
lang: en

sass:
  sass_dir: _sass
  style: :compressed

# Options

# Replace this value and uncomment to enable Google Analytics tracking
# google_analytics: UA-000000-0

# Replace this value and uncomment to enable Disqus
# disqus: xxxxxx

# Specify the author for blog posts
author:
  name: Ralf
  url: https://github.com/r4lfvb/
  #email: